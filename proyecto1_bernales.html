<!DOCTYPE html>
<html lang="es">
<head><meta charset="UTF-8"><title>Proyecto 1 - Contacto</title></head>
<body>
    <center>
        <h2>CONTACTO</h2>
        <form action="/enviar.php">
            <fieldset>
                <legend>Envíanos un mensaje</legend>
                <label for="nombre">Nombre:</label><br>
                <input type="text" id="nombre" name="nombre" placeholder="Tu nombre" required><br><br>

                <label for="email">E-mail:</label><br>
                <input type="email" id="email" name="email" placeholder="ejemplo@correo.com" required><br><br>

                <label for="mensaje">Mensaje:</label><br>
                <textarea id="mensaje" name="mensaje" rows="4" cols="30" placeholder="Escribe aquí..."></textarea><br><br>

                <input type="submit" value="ENVIAR MENSAJE">
            </fieldset>
        </form>
    </center>
</body>
</html>
